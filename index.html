<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Minimal Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, -system-ui,
        "Segoe UI", sans-serif;
      background-color: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.5;
    }

    a {
      text-decoration: none;
      color: #0071e3;
    }

    a:hover {
      text-decoration: underline;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top navigation */
    .nav {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(20px);
      background-color: rgba(245, 245, 247, 0.8);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .nav-inner {
      max-width: 980px;
      margin: 0 auto;
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }

    .nav-logo {
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      color: #1d1d1f;
      opacity: 0.8;
    }

    .nav-links a:hover {
      opacity: 1;
    }

    /* Main content */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 2rem;
    }

    .hero {
      text-align: center;
      max-width: 640px;
    }

    .hero-eyebrow {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #6e6e73;
      margin-bottom: 0.75rem;
    }

    .hero-title {
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }

    .hero-subtitle {
      font-size: 1.1rem;
      color: #515154;
      max-width: 480px;
      margin: 0.5rem auto 1.75rem;
    }

    .hero-cta {
      display: inline-flex;
      gap: 1.25rem;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 1.5rem;
      border-radius: 999px;
      border: none;
      background-color: #0071e3;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease,
        background-color 0.15s ease;
    }

    .btn-primary:hover {
      background-color: #0077ed;
      box-shadow: 0 8px 20px rgba(0, 113, 227, 0.2);
      transform: translateY(-1px);
    }

    .btn-link {
      font-size: 0.95rem;
      color: #0071e3;
      cursor: pointer;
    }

    .btn-link:hover {
      text-decoration: underline;
    }

    /* Footer */
    .footer {
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      padding: 1.5rem 1.5rem 2rem;
      font-size: 0.75rem;
      color: #6e6e73;
    }

    .footer-inner {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: space-between;
      align-items: center;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
    }

    .footer-links a {
      color: #424245;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .nav-inner {
        padding-inline: 1rem;
      }

      .nav-links {
        gap: 1rem;
        font-size: 0.8rem;
      }

      .footer-inner {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Top navigation -->
    <header class="nav">
      <div class="nav-inner">
        <div class="nav-logo">MyBrand</div>
        <nav class="nav-links">
          <a href="#product">Product</a>
          <a href="#features">Features</a>
          <a href="#pricing">Prijzen</a>
        </nav>
      </div>
    </header>

    <!-- Main content -->
    <main class="main">
      <section class="hero">
        <div class="hero-eyebrow">Nieuw</div>
        <h1 class="hero-title">Een simpele, focuste pagina.</h1>
        <p class="hero-subtitle">
          Een rustige lay-out met één duidelijke boodschap. Geen ruis, alleen
          wat belangrijk is voor jouw bezoeker.
        </p>
        <div class="hero-cta">
          <button class="btn-primary">Begin nu</button>
          <button class="btn-link">Meer informatie &rsaquo;</button>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-inner">
        <div>&copy; <span id="year"></span> MyBrand. Alle rechten voorbehouden.</div>
        <div class="footer-links">
          <a href="#privacy">Privacy Policy</a>
          <a href="#terms">Terms of Service</a>
        </div>
      </div>
    </footer>
  </div>

  <script>
    // Zet automatisch het huidige jaar in de footer
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
